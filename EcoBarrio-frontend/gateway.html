<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway</title>
    <!--bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--CSS-->
    <link rel="stylesheet" href="public/css/gateway.css">
</head>
<body>
    <div class="container-fluid">
       <main>
            <section class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
                <div class="card" style="width: 18rem;">
                    <div class="card-body"> <form id="EnviarForm">
                            <div class="mb-3">
                                <label for="correo" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="correo" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="contrasenia" class="form-label">Password</label>
                                <input type="password" id="contrasenia" class="form-control" required>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">Entrar como Admin</button>
                        </form>
                    </div>
                </div> 
            </section>
        </main>
    </div>
        

    <!--Bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!--JS-->
    <script type="module" src="public/js/gateway.js"></script>
</body>
</html>
